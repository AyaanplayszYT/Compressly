name: Build Compressly v2

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    defaults:
      run:
        working-directory: compresslyv2

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: compresslyv2/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "compresslyv2/src-tauri -> target"

      - name: Install Node deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: compressly-v2-windows
          path: |
            compresslyv2/src-tauri/target/release/bundle/nsis/*.exe
            compresslyv2/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 14

  build-linux:
    name: Linux x64 (for Codespaces testing)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compresslyv2

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: compresslyv2/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "compresslyv2/src-tauri -> target"

      - name: Install Node deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles deb,appimage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: compressly-v2-linux
          path: |
            compresslyv2/src-tauri/target/release/bundle/deb/*.deb
            compresslyv2/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Compressly v${{ github.ref_name }}"
          body: |
            ## Compressly ${{ github.ref_name }}

            Modern image compression — built with Rust + Tauri v2.

            ### Downloads
            - **Windows**: `.exe` (NSIS installer) or `.msi`
            - **Linux**: `.deb` or `.AppImage`

            ### What's new
            - See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/compresslyv2/CHANGELOG.md)
          files: artifacts/**/*
          draft: false
